<style>
  /* ── LOGIN ── */
  #login-overlay {
    position: fixed; inset: 0; z-index: 9999;
    background: #1a237e;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .login-box {
    width: 88%; max-width: 340px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 2.5rem; padding: 40px 32px 36px;
    display: flex; flex-direction: column; align-items: center; gap: 20px;
  }
  .login-logo { display: flex; align-items: center; gap: 10px; }
  .login-title { color: white; font-size: 20px; font-weight: 900; }
  .login-sub { color: rgba(255,255,255,0.45); font-size: 12px; text-align: center; line-height: 1.6; margin-top: -8px; }
  .pin-dots { display: flex; gap: 12px; }
  .pin-dot { width: 14px; height: 14px; border-radius: 50%; background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.3); transition: all 0.2s; }
  .pin-dot.filled { background: #818cf8; border-color: #818cf8; transform: scale(1.1); }
  #pin-input {
    width: 100%; background: rgba(255,255,255,0.08); border: 1.5px solid rgba(255,255,255,0.15);
    border-radius: 1.2rem; padding: 14px 18px; color: white; font-size: 22px; font-weight: 900;
    text-align: center; letter-spacing: 0.5em; outline: none; transition: border-color 0.2s;
    -webkit-text-security: disc;
  }
  #pin-input:focus { border-color: #818cf8; }
  #pin-input::placeholder { color: rgba(255,255,255,0.25); font-size: 14px; letter-spacing: 0.05em; font-weight: 400; }
  .login-btn { width: 100%; background: #4f46e5; color: white; border: none; padding: 15px; border-radius: 1.5rem; font-size: 15px; font-weight: 900; cursor: pointer; transition: all 0.15s; }
  .login-btn:active { transform: scale(0.97); }
  .login-shake { animation: shake 0.4s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)} }

  /* ── ROOT ── */
  :root {
    --navy: #1a237e;
    --slate-50: #f8fafc; --slate-100: #f1f5f9; --slate-200: #e2e8f0;
    --slate-300: #cbd5e1; --slate-400: #94a3b8; --slate-500: #64748b;
    --slate-800: #1e293b; --slate-900: #0f172a;
    --indigo-50: #eef2ff; --indigo-200: #c7d2fe; --indigo-400: #818cf8; --indigo-600: #4f46e5;
    --rose-500: #f43f5e; --rose-700: #be123c;
    --purple-600: #9333ea; --emerald-600: #059669;
    --amber-500: #f59e0b; --amber-600: #d97706;
    --teal-600: #0d9488; --orange-500: #f97316; --blue-600: #2563eb;
  }
  /* ✅ 다크모드 강제 비활성화 — 갤럭시 등 안드로이드 다크테마 무시 */
  :root { color-scheme: light only; }
  @media (prefers-color-scheme: dark) {
    html { filter: none !important; }
    body { background: var(--slate-100) !important; color: var(--slate-800) !important; }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', 'Malgun Gothic', sans-serif; background: var(--slate-100); color: var(--slate-800); min-height: 100dvh; overflow-x: hidden; }

  /* ── NAV ── */
  nav { background: var(--navy); color: white; position: sticky; top: 0; z-index: 100; height: 56px; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
  nav .logo { display: flex; align-items: center; gap: 8px; }
  nav h1 { font-size: 17px; font-weight: 900; letter-spacing: -0.5px; }
  nav .nav-right { display: flex; gap: 8px; align-items: center; }
  nav button { background: rgba(255,255,255,0.1); border: none; color: white; padding: 8px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
  nav button:hover { background: rgba(255,255,255,0.2); }
  nav button.active { background: var(--amber-500); }
  #sync-indicator { font-size: 10px; color: rgba(255,255,255,0.5); }
  #sync-indicator.saving { color: #fbbf24; }
  #sync-indicator.saved { color: #34d399; }
  #logout-btn { background: rgba(255,255,255,0.08) !important; }

  /* ── MONTH HEADER ── */
  #month-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; background: white; border-bottom: 1px solid var(--slate-200); position: sticky; top: 56px; z-index: 90; box-shadow: 0 1px 6px rgba(0,0,0,0.06); }
  #month-header button { background: var(--slate-50); border: none; padding: 8px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  #month-title { text-align: center; }
  #month-title .label { font-size: 9px; font-weight: 900; color: var(--indigo-600); letter-spacing: 0.3em; text-transform: uppercase; }
  #month-title h2 { font-size: 20px; font-weight: 900; }

  /* ── CALENDAR ── */
  /* ✅ 개선3: 배너 높이만큼 하단 여백 확보 */
  #calendar-section { padding-bottom: 110px; }
  #calendar-wrap { max-width: 480px; margin: 0 auto; background: white; }
  .dow-header { display: grid; grid-template-columns: repeat(7,1fr); background: var(--slate-50); border-bottom: 1px solid var(--slate-200); }
  .dow-header div { text-align: center; padding: 8px 0; font-size: 11px; font-weight: 900; color: var(--slate-400); }
  .dow-header div:first-child { color: #f43f5e; }
  .dow-header div:last-child { color: #2563eb; }

  .calendar-grid { display: grid; grid-template-columns: repeat(7,1fr); }
  .cal-cell-empty { min-height: 185px; border-right: 1px solid #f1f5f9; border-bottom: 1px solid #f1f5f9; background: var(--slate-50); opacity: 0.4; }
  .cal-cell {
    /* ✅ 개선2: 셀 높이 키움 */
    min-height: 185px;
    padding: 6px 4px 4px;
    border-right: 1px solid #f1f5f9;
    border-bottom: 1px solid #f1f5f9;
    background: white;
    position: relative; overflow: hidden; cursor: pointer;
    display: flex; flex-direction: column; transition: background 0.15s;
  }
  .cal-cell.selected { background: #eef2ff; box-shadow: inset 0 0 0 2px var(--indigo-400); z-index: 2; }
  /* ✅ 개선1: CT 워터마크 — 배지 전체 흐리기 제거, JS에서 개별 배지별로 처리 */
  /* dimmed: 다른 직원 선택 시 */
  .cal-cell.dimmed { opacity: 0.12; filter: grayscale(0.8); }
  .hl-overlay { position: absolute; inset: 0; z-index: 0; pointer-events: none; display: flex; align-items: center; justify-content: center; }
  .cell-inner { position: relative; z-index: 1; display: flex; flex-direction: column; height: 100%; }

  /* ✅ 개선2: 날짜 숫자 크게 */
  .day-header-row { display: flex; align-items: center; gap: 3px; margin-bottom: 3px; }
  .day-num { font-size: 18px; font-weight: 900; line-height: 1; }
  .day-num.sun { color: #f43f5e; }
  .day-num.sat { color: #2563eb; }
  .memo-icon { display: flex; align-items: center; color: var(--amber-500); }
  .memo-icon svg { width: 10px; height: 10px; }

  .dots { display: flex; gap: 2px; height: 6px; margin-bottom: 3px; }
  .dot { width: 6px; height: 6px; background: var(--indigo-400); border-radius: 50%; }

  .badge-slots { display: flex; flex-direction: column; gap: 2px; }
  .badge-row { min-height: 16px; display: flex; flex-wrap: wrap; gap: 1px; }
  /* CT 근무일: 본인 배지는 선명, 타인 배지는 흐리게 */
  .cal-cell.ct-day .badge.other-badge { opacity: 0.3; }
  .cal-cell.ct-day .evening-tag.other-tag { opacity: 0.3; }
  .cal-cell.ct-day .night-tag.other-tag { opacity: 0.3; }
  /* ✅ 개선2: 배지 폰트 키움 */
  .badge { font-size: 10px; font-weight: 900; color: white; padding: 2px 5px; border-radius: 4px; line-height: 1.35; white-space: nowrap; }
  .badge.half-am { background: var(--orange-500); }
  .badge.half-pm { background: var(--blue-600); }
  .badge.off40-weekday { background: var(--rose-700); }
  .badge.off40-sat { background: #3730a3; }
  .badge.vacation { background: var(--purple-600); }
  .badge.alt-leave { background: white; color: var(--emerald-600); border: 1px solid var(--emerald-600); font-size: 9px; }
  /* 대휴 사유별 뱃지 */
  .badge.alt-rest     { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; font-size: 9px; }
  .badge.alt-reserve  { background: #dbeafe; color: #1e40af; border: 1px solid #93c5fd; font-size: 9px; }
  .badge.alt-event    { background: #fce7f3; color: #9d174d; border: 1px solid #f9a8d4; font-size: 9px; }
  .badge.alt-public   { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; font-size: 9px; }
  .badge.alt-half-am  { background: #ede9fe; color: #5b21b6; border: 1px solid #c4b5fd; font-size: 9px; }
  .badge.alt-half-pm  { background: #fdf2f8; color: #7e22ce; border: 1px solid #e879f9; font-size: 9px; }

  /* 대휴 사유 선택 팝업 */
  #alt-reason-overlay {
    position: fixed; inset: 0; z-index: 500;
    background: rgba(2,6,23,0.7); backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  #alt-reason-overlay.open { opacity: 1; pointer-events: all; }
  #alt-reason-box {
    background: white; border-radius: 2rem; padding: 28px 24px;
    width: 88%; max-width: 340px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    transform: scale(0.92); transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
  }
  #alt-reason-overlay.open #alt-reason-box { transform: scale(1); }
  .alt-reason-title { font-size: 11px; font-weight: 900; color: var(--emerald-600); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
  .alt-reason-sub { font-size: 16px; font-weight: 900; color: var(--slate-900); margin-bottom: 20px; }
  .alt-reason-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .alt-reason-btn {
    padding: 14px 8px; border-radius: 1.2rem; border: 2px solid var(--slate-200);
    background: var(--slate-50); cursor: pointer; font-size: 13px; font-weight: 900;
    color: var(--slate-700); transition: all 0.15s; text-align: center; line-height: 1.3;
  }
  .alt-reason-btn:hover { transform: scale(1.03); }
  .alt-reason-btn.type-rest    { border-color: #6ee7b7; background: #d1fae5; color: #065f46; }
  .alt-reason-btn.type-reserve { border-color: #93c5fd; background: #dbeafe; color: #1e40af; }
  .alt-reason-btn.type-event   { border-color: #f9a8d4; background: #fce7f3; color: #9d174d; }
  .alt-reason-btn.type-public  { border-color: #fcd34d; background: #fef3c7; color: #92400e; }
  .alt-reason-btn.type-half-am { border-color: #c4b5fd; background: #ede9fe; color: #5b21b6; }
  .alt-reason-btn.type-half-pm { border-color: #e879f9; background: #fdf2f8; color: #7e22ce; }
  .alt-reason-cancel { width: 100%; padding: 13px; border: none; background: var(--slate-100); color: var(--slate-500); border-radius: 1.2rem; font-size: 14px; font-weight: 700; cursor: pointer; }

  /* ✅ 개선2: E:/N: 태그 크게 */
  .bottom-tags { margin-top: auto; display: flex; flex-direction: column; gap: 2px; padding-top: 3px; }
  .evening-tag { font-size: 11px; font-weight: 900; color: #92400e; background: #fef3c7; padding: 2px 4px; border-radius: 4px; line-height: 1.4; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .night-tag { font-size: 11px; font-weight: 900; color: #3730a3; background: #e0e7ff; padding: 2px 4px; border-radius: 4px; line-height: 1.4; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ── BOTTOM BANNER ── */
  #bottom-banner { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); z-index: 200; width: 95%; max-width: 440px; }
  .banner-inner { background: rgba(15,23,42,0.88); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.15); border-radius: 2rem; padding: 10px 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.35); }
  .banner-scroll-wrap { position: relative; display: flex; align-items: center; }
  .banner-scroll { display: flex; gap: 6px; overflow-x: auto; padding: 4px 28px; scrollbar-width: none; scroll-behavior: smooth; }
  .banner-scroll::-webkit-scrollbar { display: none; }
  .banner-arr { position: absolute; z-index: 10; background: #334155; border: none; color: white; width: 24px; height: 24px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .banner-arr.left { left: 0; } .banner-arr.right { right: 0; }
  .doc-btn { width: 46px; height: 46px; flex-shrink: 0; border-radius: 50%; border: 2px solid transparent; background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.9); cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.2s; position: relative; }
  .doc-btn .t { font-size: 7px; font-weight: 900; line-height: 1; margin-bottom: 1px; }
  .doc-btn .n { font-size: 13px; font-weight: 900; line-height: 1; }
  .doc-btn.active { background: white; color: var(--slate-900); border-color: var(--amber-500); transform: scale(1.1); box-shadow: 0 4px 16px rgba(0,0,0,0.4); }
  .doc-btn.active::after { content:''; position:absolute; top:-4px; right:-4px; width:12px; height:12px; background:var(--amber-500); border-radius:50%; border:2px solid #0f172a; }

  /* ── POPUP ── */
  #popup-overlay { position: fixed; inset: 0; z-index: 210; background: rgba(2,6,23,0.8); backdrop-filter: blur(12px); display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
  #popup-overlay.open { opacity: 1; pointer-events: all; }
  #popup-sheet { background: white; width: 100%; max-width: 480px; border-radius: 3rem 3rem 0 0; padding: 28px 24px 48px; max-height: 92dvh; overflow-y: auto; transform: translateY(40px); transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); }
  #popup-overlay.open #popup-sheet { transform: translateY(0); }
  .sheet-handle { width: 48px; height: 5px; background: var(--slate-200); border-radius: 99px; margin: 0 auto 24px; }
  .sheet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .sheet-title-wrap .label { font-size: 9px; font-weight: 900; color: var(--indigo-600); letter-spacing: 0.3em; text-transform: uppercase; margin-bottom: 2px; }
  .sheet-title-wrap h3 { font-size: 26px; font-weight: 900; }
  .close-btn { background: var(--slate-100); border: none; padding: 14px; border-radius: 1.5rem; cursor: pointer; color: var(--slate-300); transition: all 0.2s; }
  .close-btn:hover { background: #fee2e2; color: var(--rose-500); }
  .close-btn svg { width: 28px; height: 28px; }

  .popup-doc-wrap { background: var(--slate-50); padding: 12px; border-radius: 1.5rem; border: 1px solid var(--slate-100); position: relative; margin-bottom: 20px; display: flex; align-items: center; }
  .popup-doc-scroll { display: flex; gap: 8px; overflow-x: auto; padding: 4px 28px; scrollbar-width: none; scroll-behavior: smooth; }
  .popup-doc-scroll::-webkit-scrollbar { display: none; }
  .popup-arr { position: absolute; z-index: 10; background: white; border: 1px solid var(--slate-200); color: var(--slate-500); width: 28px; height: 28px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  .popup-arr.left { left: 4px; } .popup-arr.right { right: 4px; }
  .pdoc-btn { width: 54px; height: 54px; flex-shrink: 0; border-radius: 1rem; border: 2px solid var(--slate-200); background: white; color: var(--slate-500); cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.15s; }
  .pdoc-btn .t { font-size: 9px; font-weight: 700; opacity: 0.7; line-height: 1; margin-bottom: 2px; }
  .pdoc-btn .n { font-size: 14px; font-weight: 900; }
  .pdoc-btn.active { background: var(--indigo-600); color: white; border-color: var(--indigo-600); box-shadow: 0 2px 8px rgba(79,70,229,0.4); transform: scale(1.05); }

  /* duty rows */
  .duty-rows { display: flex; flex-direction: column; gap: 10px; }
  .duty-row { border-radius: 2rem; border: 1px solid var(--slate-100); background: var(--slate-50); padding: 14px 16px; transition: all 0.2s; cursor: pointer; }
  .duty-row:hover { border-color: var(--slate-300); background: white; }
  .duty-row.active-row { background: var(--indigo-50); border-color: var(--indigo-200); box-shadow: 0 0 0 2px #eef2ff; }
  .duty-row.no-doc { cursor: default; }
  .duty-row.no-doc:hover { border-color: var(--slate-100); background: var(--slate-50); }
  .duty-row-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .duty-row-label { font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.08em; }
  .assign-btn { padding: 8px 20px; border-radius: 99px; border: none; font-size: 11px; font-weight: 900; cursor: pointer; transition: all 0.15s; flex-shrink: 0; }
  .assign-btn.add { background: var(--slate-900); color: white; }
  .assign-btn.remove { background: var(--rose-500); color: white; }
  .assigned-list { display: flex; flex-wrap: wrap; gap: 6px; min-height: 34px; align-items: center; }
  .assigned-chip { background: white; border: 1px solid currentColor; border-radius: 1.5rem; padding: 6px 14px; font-size: 11px; font-weight: 900; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.15s; }
  .assigned-chip:hover { background: #fee2e2; border-color: var(--rose-500); color: var(--rose-500); }
  .assigned-chip .del-icon { opacity: 0.3; font-size: 12px; }
  .assigned-chip:hover .del-icon { opacity: 1; }
  .no-assign { font-size: 11px; color: var(--slate-300); font-style: italic; font-weight: 700; }
  .no-doc-hint { font-size: 10px; color: var(--slate-300); font-weight: 700; background: white; padding: 5px 12px; border-radius: 99px; border: 1px solid var(--slate-200); white-space: nowrap; }

  /* memo */
  .memo-section { margin-top: 24px; background: #fffbeb; border: 1px solid #fde68a; border-radius: 2rem; padding: 16px 18px; }
  .memo-section-header { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
  .memo-section-label { font-size: 11px; font-weight: 900; color: var(--amber-600); text-transform: uppercase; letter-spacing: 0.08em; }
  .memo-textarea { width: 100%; min-height: 80px; background: white; border: 1px solid #fde68a; border-radius: 1.2rem; padding: 12px 14px; font-size: 14px; font-family: inherit; color: var(--slate-800); resize: none; outline: none; transition: border-color 0.2s; line-height: 1.5; }
  .memo-textarea::placeholder { color: var(--slate-300); }
  .memo-textarea:focus { border-color: var(--amber-500); box-shadow: 0 0 0 3px rgba(245,158,11,0.1); }
  .memo-save-btn { margin-top: 8px; background: var(--amber-500); color: white; border: none; padding: 10px 22px; border-radius: 99px; font-size: 12px; font-weight: 900; cursor: pointer; float: right; }
  .memo-clear { clear: both; }

  .done-btn { width: 100%; margin-top: 32px; background: var(--slate-900); color: white; border: none; padding: 18px; border-radius: 2rem; font-size: 16px; font-weight: 900; cursor: pointer; display: block; transition: all 0.15s; }
  .done-btn:active { transform: scale(0.98); }

  /* screening */

        if (snap.exists()) {
          window.schedule = snap.data();
          renderCalendar(); renderReport(); loadNotice();
        }
      });
    }
  });
  signInAnonymously(auth).catch(() => window.setSyncStatus('offline'));
} catch(e) { window.setSyncStatus && window.setSyncStatus('offline'); }

window.saveToCloud = async function(s) {
  if (!db || !auth?.currentUser) return;
  window.setSyncStatus('saving');
  try {
    await setDoc(doc(db, 'radiology', 'schedule_v1'), s);
    window.setSyncStatus('saved');
    setTimeout(() => window.setSyncStatus('online'), 2000);
  } catch(e) { window.setSyncStatus('offline'); }
};
</script>

<script>

const DUTY_ROWS = [
  { id:'half_am',  label:'오전반차',    color:'c-orange', useName:false },
  { id:'half_pm',  label:'오후반차',    color:'c-blue',   useName:false },

  { id:'ctmr',     label:'CT / MR',    color:'c-teal',   useName:false },
  { id:'evening',  label:'이브닝',      color:'c-amber',  useName:true  },
  { id:'night',    label:'야간당직',    color:'c-indigo', useName:true  }
];

const DOT_MARKERS = {
  "2026-03-07":1,"2026-03-14":2,"2026-03-21":2,"2026-03-28":1,
  "2026-04-04":1,"2026-04-11":2,"2026-04-18":2,"2026-04-25":1
};
const FIXED_HOLIDAYS = {"03-01":"삼일절","05-05":"어린이날","06-06":"현충일","08-15":"광복절"};
window.schedule = {};

let viewYear=2026, viewMonth=3;
let selectedDateKey=null, selectedDoc=null, showScreening=false;

function isHoliday(dk) { return !!FIXED_HOLIDAYS[dk.slice(5)]; }
function showToast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),2000);
}

// ── 하이라이트 타입 ────────────────────────────────────
function getHighlightType(dateKey) {
  if (!selectedDoc) return null;
  const day = window.schedule[dateKey]; if (!day) return null;
  const isSat = new Date(dateKey).getDay()===6;
  if ((day.night||'').includes(selectedDoc.name)||(day.evening||'').includes(selectedDoc.name)) return 'blue';
  if ((day.vacation||'').includes(selectedDoc.initial)) return 'red';
  if ((day.half_am||'').includes(selectedDoc.initial)) return 'half-am';
  if ((day.off40||'').includes(selectedDoc.initial)||(day.half_pm||'').includes(selectedDoc.initial)) return isSat?'red':'half-pm';
  // ✅ 대휴 버그 수정: alt_leave에 해당 직원 초성이 있으면 green으로 하이라이트
  if (hasAltLeave(day, selectedDoc.initial)) return 'green';
  return null;
}

// alt_leave 데이터에서 특정 초성이 있는지 검사 (사유:초성 형식 지원)
function hasAltLeave(dayData, initial) {
  const raw = dayData.alt_leave || '';
  return raw.split(' ').filter(Boolean).some(item => {
    // 형식: "rest:봉" 또는 구형 "봉"
    const name = item.includes(':') ? item.split(':')[1] : item;
    return name === initial;
  });
}

// alt_leave에서 특정 직원의 사유 가져오기
function getAltLeaveReason(dayData, initial) {
  const raw = dayData.alt_leave || '';
  const found = raw.split(' ').filter(Boolean).find(item => {
    const name = item.includes(':') ? item.split(':')[1] : item;
    return name === initial;
  });
  if (!found) return null;
  return found.includes(':') ? found.split(':')[0] : 'rest';
}

// ── 캘린더 렌더 ───────────────────────────────────────
function renderCalendar() {
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  const firstDay = new Date(viewYear,viewMonth,1).getDay();
  const lastDate = new Date(viewYear,viewMonth+1,0).getDate();

  for (let i=0;i<firstDay;i++) { const e=document.createElement('div'); e.className='cal-cell-empty'; grid.appendChild(e); }

  for (let d=1;d<=lastDate;d++) {
    const dateKey=`${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayData=window.schedule[dateKey]||{};
    const dow=new Date(dateKey).getDay();
    const isSun=dow===0, isSat=dow===6;

    // ✅ 개선1: 선택된 직원이 CT 근무인지 확인
    const isCT = selectedDoc && (dayData.ctmr||'').split(' ').filter(Boolean).includes(selectedDoc.initial);
    const hl = getHighlightType(dateKey);

    const cell = document.createElement('div');
    // CT 근무인 날은 ct-day 클래스 추가 → 배지들 자동으로 흐려짐(CSS)
    cell.className = 'cal-cell'
      + (selectedDateKey===dateKey?' selected':'')
      + (isCT?' ct-day':'');

    // 하이라이트 오버레이
    if (hl || isCT) {
      const ov = document.createElement('div');
      ov.className = 'hl-overlay';
      if (hl==='blue')    ov.style.background='rgba(59,130,246,0.22)';
      else if (hl==='green')   ov.style.background='rgba(16,185,129,0.22)';
      else if (hl==='red')    ov.style.background='rgba(239,68,68,0.22)';
      else if (hl==='half-am') ov.style.background='linear-gradient(to bottom,rgba(239,68,68,0.22) 50%,transparent 50%)';
      else if (hl==='half-pm') ov.style.background='linear-gradient(to top,rgba(239,68,68,0.22) 50%,transparent 50%)';

      // ✅ 개선1: CT 워터마크 — 진하고 크게, 색상도 teal 계열로 눈에 띄게
      if (isCT) {
        const ctLabel = document.createElement('span');
        ctLabel.style.cssText = 'font-size:36px;font-weight:900;color:rgba(13,148,136,0.22);letter-spacing:-1px;pointer-events:none;user-select:none;';
        ctLabel.textContent = (dayData.ctmr||'').includes('MR') ? 'CT·MR' : 'CT';
        ov.appendChild(ctLabel);
      }
      cell.appendChild(ov);
    }

    // 선택된 직원 있고, 이 날 해당 없으면 흐리게
    if (selectedDoc && !hl && !isCT) cell.classList.add('dimmed');

    const inner = document.createElement('div');
    inner.className = 'cell-inner';

    // 날짜 + 메모 아이콘
    const dayHeaderRow = document.createElement('div');
    dayHeaderRow.className = 'day-header-row';
    const numSpan = document.createElement('span');
    numSpan.className = 'day-num'+(isSun?' sun':(isSat?' sat':''));
    numSpan.textContent = d;
    dayHeaderRow.appendChild(numSpan);
    if (dayData.memo && dayData.memo.trim()) {
      const mi = document.createElement('span');
      mi.className = 'memo-icon'; mi.title = dayData.memo;
      mi.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4a2 2 0 0 0-2 2v18l4-4h14a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2z"/></svg>`;
      dayHeaderRow.appendChild(mi);
    }
    inner.appendChild(dayHeaderRow);

    // 도트
    const dots = DOT_MARKERS[dateKey];
    if (dots) {
      const dr=document.createElement('div'); dr.className='dots';
      for(let x=0;x<dots;x++){const dt=document.createElement('div');dt.className='dot';dr.appendChild(dt);}
      inner.appendChild(dr);
    } else { const ph=document.createElement('div'); ph.style.height='10px'; inner.appendChild(ph); }

    // 배지 슬롯
    const slots=document.createElement('div'); slots.className='badge-slots';
    const mkRow=()=>{const r=document.createElement('div');r.className='badge-row';return r;};

    // CT 근무일에 본인 초성/이름인지 판별하는 헬퍼
    // isCT가 true일 때만 my-badge / other-badge 클래스를 붙임
    const badgeClass = (initial) => {
      if (!isCT) return '';
      return (selectedDoc && selectedDoc.initial === initial) ? ' my-badge' : ' other-badge';
    };
    const tagClass = (name) => {
      if (!isCT) return '';
      return (selectedDoc && (selectedDoc.name === name || selectedDoc.initial === name)) ? ' my-tag' : ' other-tag';
    };

    const rAm=mkRow(); (dayData.half_am||'').split(' ').filter(Boolean).forEach(n=>{const b=document.createElement('span');b.className='badge half-am'+badgeClass(n);b.textContent='☀'+n;rAm.appendChild(b);}); slots.appendChild(rAm);
    const rPm=mkRow(); (dayData.half_pm||'').split(' ').filter(Boolean).forEach(n=>{const b=document.createElement('span');b.className='badge half-pm'+badgeClass(n);b.textContent='🌙'+n;rPm.appendChild(b);}); slots.appendChild(rPm);
    const rOff=mkRow(); (dayData.off40||'').split(' ').filter(Boolean).forEach(n=>{const b=document.createElement('span');b.className='badge '+(isSat?'off40-sat':'off40-weekday')+badgeClass(n);b.textContent=isSat?n:'40:'+n;rOff.appendChild(b);}); slots.appendChild(rOff);
    const rVac=mkRow();
    (dayData.vacation||'').split(' ').filter(Boolean).forEach(n=>{const b=document.createElement('span');b.className='badge vacation'+badgeClass(n);b.textContent='🏝'+n;rVac.appendChild(b);});
    // ✅ 대휴: 사유별 다른 아이콘/색상 표시
    (dayData.alt_leave||'').split(' ').filter(Boolean).forEach(item=>{
      const reason = item.includes(':') ? item.split(':')[0] : 'rest';
      const name   = item.includes(':') ? item.split(':')[1] : item;
      const icons  = {rest:'🌿', reserve:'🪖', event:'💐', public:'🏛', 'half-am':'☀️', 'half-pm':'🌙'};
      const classes= {rest:'alt-rest', reserve:'alt-reserve', event:'alt-event', public:'alt-public', 'half-am':'alt-half-am', 'half-pm':'alt-half-pm'};
      const b=document.createElement('span');
      b.className='badge '+(classes[reason]||'alt-rest')+badgeClass(name);
      b.textContent=(icons[reason]||'🌿')+name;
      rVac.appendChild(b);
    });
    slots.appendChild(rVac);
    inner.appendChild(slots);

    // 이브닝/야간 하단
    const bottom=document.createElement('div'); bottom.className='bottom-tags';
    (dayData.evening||'').split(' ').filter(Boolean).forEach(n=>{const t=document.createElement('div');t.className='evening-tag'+tagClass(n);t.textContent=n;bottom.appendChild(t);});
    (dayData.night||'').split(' ').filter(Boolean).forEach(n=>{const t=document.createElement('div');t.className='night-tag'+tagClass(n);t.textContent=n;bottom.appendChild(t);});
    inner.appendChild(bottom);

    cell.appendChild(inner);
    cell.addEventListener('click', ()=>openPopup(dateKey));
    grid.appendChild(cell);
  }
  document.getElementById('month-text').textContent=`${viewYear}년 ${viewMonth+1}월`;
}

// ── 배너 ──────────────────────────────────────────────
function renderBanner() {
  const scroll=document.getElementById('banner-scroll');
  scroll.innerHTML='';
  DOCTOR_MAP.forEach(doc=>{
    const btn=document.createElement('button');
    btn.className='doc-btn'+(selectedDoc?.name===doc.name?' active':'');

    scroll.appendChild(btn);

function bannerScroll(dir){ document.getElementById('banner-scroll').scrollBy({left:dir*200,behavior:'smooth'}); }
window.bannerScroll=bannerScroll;

// ── 팝업 ──────────────────────────────────────────────
function openPopup(dateKey) {
  selectedDateKey=dateKey; selectedDoc=null;
  renderBanner(); renderCalendar();
  document.getElementById('popup-title').textContent=dateKey.slice(5)+' 배정';
  document.getElementById('memo-textarea').value=(window.schedule[dateKey]||{}).memo||'';
  renderPopupDocs(); renderDutyRows();
  document.getElementById('popup-overlay').classList.add('open');
}

function _doClosePopup() {
  document.getElementById('popup-overlay').classList.remove('open');
  selectedDateKey=null; selectedDoc=null;
  renderBanner(); renderCalendar();
}
window.closePopup=(e)=>{ if(e.target===document.getElementById('popup-overlay'))_doClosePopup(); };
window.closePopupDirect=_doClosePopup;

function renderPopupDocs() {
  const scroll=document.getElementById('popup-doc-scroll');
  scroll.innerHTML='';
  DOCTOR_MAP.forEach(doc=>{
    const btn=document.createElement('button');
    btn.className='pdoc-btn'+(selectedDoc?.name===doc.name?' active':'');
    btn.innerHTML=`<span class="t">${doc.title}</span><span class="n">${doc.initial}</span>`;
    btn.onclick=()=>{ selectedDoc=selectedDoc?.name===doc.name?null:doc; renderPopupDocs(); renderDutyRows(); renderBanner(); renderCalendar(); };
    scroll.appendChild(btn);
  });

function popupScroll(dir){ document.getElementById('popup-doc-scroll').scrollBy({left:dir*200,behavior:'smooth'}); }
window.popupScroll=popupScroll;

function renderDutyRows() {
  const container=document.getElementById('duty-rows');
  container.innerHTML='';
  DUTY_ROWS.forEach(row=>{
    const dayData=window.schedule[selectedDateKey]||{};
    const val=dayData[row.id]||'';
    const target=row.useName?selectedDoc?.name:selectedDoc?.initial;
    const isActive=!!(selectedDoc&&target&&val.split(' ').filter(Boolean).includes(target));

    const div=document.createElement('div');
    div.className='duty-row'+(isActive?' active-row':'')+((!selectedDoc)?' no-doc':'');

    // 박스 전체 클릭으로 배정/제거
    // alt_leave는 사유 선택 팝업 경유
    div.addEventListener('click',()=>{
      if(!selectedDoc) return;
      if(row.id==='alt_leave') openAltReasonPopup(selectedDateKey, selectedDoc);
      else toggleAssignment(selectedDateKey,row.id,selectedDoc,row.useName);
    });

    const top=document.createElement('div'); top.className='duty-row-top';
    const lbl=document.createElement('span'); lbl.className='duty-row-label '+row.color; lbl.textContent=row.label;
    top.appendChild(lbl);

    if (selectedDoc) {
      const btn=document.createElement('button');
      btn.className='assign-btn '+(isActive?'remove':'add');
      btn.textContent=isActive?'제거':'배정';
      btn.addEventListener('click',(e)=>{
        e.stopPropagation();
        if(row.id==='alt_leave') openAltReasonPopup(selectedDateKey, selectedDoc);
        else toggleAssignment(selectedDateKey,row.id,selectedDoc,row.useName);
      });
      top.appendChild(btn);
    } else {
      const hint=document.createElement('span'); hint.className='no-doc-hint'; hint.textContent='위에서 직원 선택';
      top.appendChild(hint);
    }
    div.appendChild(top);

    const list=document.createElement('div'); list.className='assigned-list';
    const items=val.split(' ').filter(Boolean);
    if (items.length) {
      items.forEach(item=>{
        const chip=document.createElement('button');
        chip.className='assigned-chip '+row.color;
        let displayText = item;
        if (row.id==='alt_leave' && item.includes(':')) {
          const [rsn,nm] = item.split(':');
          const icons={rest:'🌿',reserve:'🪖',event:'💐',public:'🏛','half-am':'☀️','half-pm':'🌙'};
          displayText = (icons[rsn]||'🌿')+nm;
        }
        chip.innerHTML=`${displayText} <span class="del-icon">✕</span>`;
        chip.addEventListener('click',(e)=>{ e.stopPropagation(); removeAssignment(selectedDateKey,row.id,item); });
        list.appendChild(chip);
      });
    } else {
      const none=document.createElement('span'); none.className='no-assign'; none.textContent='배정 없음';
      list.appendChild(none);
    }
    div.appendChild(list);
    container.appendChild(div);
  });
}

// ── 배정 로직 ─────────────────────────────────────────
function toggleAssignment(dk,rowId,doc,useName) {
  const dayData=window.schedule[dk]||{};
  const target=useName?doc.name:doc.initial;
  let items=(dayData[rowId]||'').split(' ').filter(Boolean);
  const was=items.includes(target);
  if(was) items=items.filter(x=>x!==target); else items.push(target);
  window.schedule={...window.schedule,[dk]:{...dayData,[rowId]:items.join(' ')}};
  renderDutyRows(); renderCalendar();
  if(window.saveToCloud) window.saveToCloud(window.schedule);
  showToast(was?`${doc.name} 제거됨`:`${doc.name} 배정 완료 ✓`);
}
// ── 대휴 사유 팝업 ────────────────────────────────────
let _altPopupDk = null, _altPopupDoc = null;

function openAltReasonPopup(dk, doc) {
  _altPopupDk = dk; _altPopupDoc = doc;
  // 이미 배정된 사유가 있으면 → 제거 처리
  const dayData = window.schedule[dk] || {};
  if (hasAltLeave(dayData, doc.initial)) {
    // 이미 있으면 제거 (toggle)
    const raw = dayData.alt_leave || '';
    const items = raw.split(' ').filter(x => {
      const nm = x.includes(':') ? x.split(':')[1] : x;
      return nm !== doc.initial;
    });
    window.schedule = {...window.schedule, [dk]: {...dayData, alt_leave: items.join(' ')}};
    renderDutyRows(); renderCalendar();
    if (window.saveToCloud) window.saveToCloud(window.schedule);
    showToast(`${doc.name} 대휴 제거됨`);
    return;
  }
  // 없으면 사유 선택 팝업 오픈
  document.getElementById('alt-reason-name').textContent = doc.name + ' 선생님 — 사유 선택';
  document.getElementById('alt-reason-overlay').classList.add('open');
}

function closeAltReasonPopup() {
  document.getElementById('alt-reason-overlay').classList.remove('open');
  _altPopupDk = null; _altPopupDoc = null;
}
window.closeAltReasonPopup = closeAltReasonPopup;

function selectAltReason(reason) {
  if (!_altPopupDk || !_altPopupDoc) return;
  const dk = _altPopupDk, doc = _altPopupDoc;
  closeAltReasonPopup();
  const dayData = window.schedule[dk] || {};
  const existing = (dayData.alt_leave || '').split(' ').filter(Boolean);
  existing.push(reason + ':' + doc.initial);
  window.schedule = {...window.schedule, [dk]: {...dayData, alt_leave: existing.join(' ')}};
  renderDutyRows(); renderCalendar();
  if (window.saveToCloud) window.saveToCloud(window.schedule);
  const labels = {rest:'대휴', reserve:'예비군훈련', event:'경조사', public:'공가', 'half-am':'반일대휴(오전)', 'half-pm':'반일대휴(오후)'};
  showToast(`${doc.name} ${labels[reason]||'대휴'} 등록 ✓`);
}
window.selectAltReason = selectAltReason;
window.openAltReasonPopup = openAltReasonPopup;

function removeAssignment(dk,rowId,targetStr) {
  const dayData=window.schedule[dk]||{};
  const items=(dayData[rowId]||'').split(' ').filter(x=>x&&x!==targetStr);
  window.schedule={...window.schedule,[dk]:{...dayData,[rowId]:items.join(' ')}};
  renderDutyRows(); renderCalendar();
  if(window.saveToCloud) window.saveToCloud(window.schedule);
  showToast(`${targetStr} 제거됨`);
}

// ── 날씨 기능 (Open-Meteo — 키 없음, CORS 없음) ────────

async function loadWeather() {
  const OWM_KEY = '22e3baf840c5fa55ad030accdb580d84';
  // 부산 영도구 좌표 기반 호출 (도시명보다 정확)
  const LAT = 35.09, LON = 129.07;

  try {
    // 현재 날씨 + 5일 예보 병렬 호출
    const [curRes, fcRes] = await Promise.all([
      fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${LAT}&lon=${LON}&appid=${OWM_KEY}&lang=kr&units=metric`),
      fetch(`https://api.openweathermap.org/data/2.5/forecast?lat=${LAT}&lon=${LON}&appid=${OWM_KEY}&lang=kr&units=metric&cnt=10`)
    ]);
    if (!curRes.ok) throw new Error('OWM ' + curRes.status);
    const [cur, fc] = await Promise.all([curRes.json(), fcRes.json()]);

    const icon   = cur.weather[0].icon;
    const desc   = cur.weather[0].description;
    const temp   = Math.round(cur.main.temp);
    const feels  = Math.round(cur.main.feels_like);
    const humid  = cur.main.humidity;
    const windMs = Math.round(cur.wind.speed);

    // 아이콘 매핑
    const ICONS = {
      '01d':'☀️','01n':'🌙','02d':'⛅','02n':'☁️',
      '03d':'☁️','03n':'☁️','04d':'☁️','04n':'☁️',
      '09d':'🌧','09n':'🌧','10d':'🌦','10n':'🌧',
      '11d':'⛈','11n':'⛈','13d':'❄️','13n':'❄️','50d':'🌫','50n':'🌫'
    };
    const BG = {
      '01':'sunny','02':'cloudy','03':'cloudy','04':'cloudy',
      '09':'rainy','10':'rainy','11':'thunder','13':'snowy','50':'cloudy'
    };
    const getIcon = ic => ICONS[ic] || '🌤';
    const getBg   = ic => {
      if (ic.endsWith('n') && ic.startsWith('01')) return 'night';
      return BG[ic.slice(0,2)] || 'cloudy';
    };

    // 배경 클래스
    const bar = document.getElementById('weather-bar');
    bar.className = 'weather-' + getBg(icon);
    bar.id = 'weather-bar';

    // 현재 날씨 표시
    document.getElementById('weather-icon-wrap').textContent = getIcon(icon);
    document.getElementById('weather-temp').textContent = temp + '°';
    document.getElementById('weather-feels').textContent = '체감 ' + feels + '°';
    document.getElementById('weather-desc').textContent =
      desc + '  💧' + humid + '%  💨' + windMs + 'm/s';

    // 출근(8시) / 퇴근(17시) 예보
    const todayStr = new Date().toISOString().slice(0, 10);
    const list = fc.list;
    const mItem = list.find(h => h.dt_txt.startsWith(todayStr) && h.dt_txt.includes('06:00'))
               || list.find(h => h.dt_txt.startsWith(todayStr) && h.dt_txt.includes('09:00'))
               || list[0];
    const eItem = list.find(h => h.dt_txt.startsWith(todayStr) && h.dt_txt.includes('15:00'))
               || list.find(h => h.dt_txt.startsWith(todayStr) && h.dt_txt.includes('18:00'))
               || list[Math.min(3, list.length-1)];

    document.getElementById('wt-morning-icon').textContent = getIcon(mItem.weather[0].icon);
    document.getElementById('wt-morning-temp').textContent = Math.round(mItem.main.temp) + '°';
    document.getElementById('wt-evening-icon').textContent = getIcon(eItem.weather[0].icon);
    document.getElementById('wt-evening-temp').textContent = Math.round(eItem.main.temp) + '°';

    // 자동 알림 메시지
    const alerts = [];
    const eIcon = eItem.weather[0].icon;
    const eHour = new Date(eItem.dt * 1000).getHours();
    if (eIcon.startsWith('10') || eIcon.startsWith('09'))
      alerts.push(`🌂 퇴근길(${eHour}시경) 비 예보 — 우산 챙기세요!`);
    else if (eIcon.startsWith('11'))
      alerts.push('⛈ 퇴근길 천둥번개 예보 — 조심하세요!');
    else if (eIcon.startsWith('13'))
      alerts.push('❄️ 퇴근길 눈 예보 — 미끄럼 주의!');
    const mTemp = Math.round(mItem.main.temp);
    const eTemp = Math.round(eItem.main.temp);
    if (mTemp - eTemp >= 8)
      alerts.push(`🧥 오후 기온 ${mTemp-eTemp}°C 급강하 — 겉옷 챙기세요!`);

    const alertEl = document.getElementById('weather-alert');
    if (alerts.length) { alertEl.textContent = alerts.join('  '); alertEl.classList.add('show'); }
    else { alertEl.classList.remove('show'); }

    document.getElementById('weather-loading').style.display = 'none';
    document.getElementById('weather-inner').style.display = 'flex';

  } catch(e) {
    console.warn('날씨 로드 실패:', e);
    document.getElementById('weather-loading').textContent = '🌤 날씨 정보 없음';
  }
}

// ── 전체 공지사항 ─────────────────────────────────────
function loadNotice() {
  const text = (window.schedule['__notice__'] || {}).text || '';
  const el = document.getElementById('notice-text');
  if (!el) return;
  if (text.trim()) {
    el.textContent = text;
    el.classList.remove('empty');
  } else {
    el.textContent = '공지사항을 입력하세요 (✏️ 버튼)';
    el.classList.add('empty');
  }
}

function openNoticePopup() {
  const text = (window.schedule['__notice__'] || {}).text || '';
  document.getElementById('notice-edit-textarea').value = text;
  document.getElementById('notice-popup-overlay').classList.add('open');
  setTimeout(() => document.getElementById('notice-edit-textarea').focus(), 200);
}
window.openNoticePopup = openNoticePopup;

function closeNoticePopup(e) {
  if (e && e.target !== document.getElementById('notice-popup-overlay')) return;
  document.getElementById('notice-popup-overlay').classList.remove('open');
}
window.closeNoticePopup = closeNoticePopup;

function saveNotice() {
  const text = document.getElementById('notice-edit-textarea').value;
  window.schedule = { ...window.schedule, '__notice__': { text } };
  loadNotice();
  if (window.saveToCloud) window.saveToCloud(window.schedule);
  document.getElementById('notice-popup-overlay').classList.remove('open');
  showToast(text.trim() ? '공지 저장 완료 📢' : '공지가 삭제되었습니다');
}
window.saveNotice = saveNotice;

window.saveMemo=function(){
  if(!selectedDateKey) return;
  const memo=document.getElementById('memo-textarea').value.trim();
  window.schedule={...window.schedule,[selectedDateKey]:{...(window.schedule[selectedDateKey]||{}),memo}};
  renderCalendar();

// ── 정산 ──────────────────────────────────────────────
function renderReport() {
  const yearStr=String(viewYear);
  const monthPrefix=`${viewYear}-${String(viewMonth+1).padStart(2,'0')}`;
  const data=DOCTOR_MAP.map(d=>({...d,weekdays:[],weekends:[],totalHours:0,usedVacation:0}));

  Object.keys(window.schedule).forEach(dk=>{
    if(!dk.startsWith(yearStr)) return;
    const day=window.schedule[dk];
    data.forEach(doc=>{
      if((day.vacation||'').includes(doc.initial)) doc.usedVacation+=1;
      if((day.half_am||'').includes(doc.initial)) doc.usedVacation+=0.5;
      if((day.half_pm||'').includes(doc.initial)) doc.usedVacation+=0.5;
    });
  });

  Object.keys(window.schedule).forEach(dk=>{
    if(!dk.startsWith(monthPrefix)) return;
    const day=window.schedule[dk];
    const dObj=new Date(dk); const dow=dObj.getDay();
    const isH=isHoliday(dk)||dow===0;
    const tmrw=new Date(dObj); tmrw.setDate(tmrw.getDate()+1);
    const tmrwH=isHoliday(tmrw.toISOString().split('T')[0])||tmrw.getDay()===0;
    (day.night||'').split(' ').filter(Boolean).forEach(ini=>{
      const doc=data.find(x=>x.initial===ini||x.name===ini); if(!doc) return;
      if(isH){doc.weekends.push(dObj.getDate());doc.totalHours+=14.5;}
      else if(dow===6){doc.weekends.push(dObj.getDate());doc.totalHours+=16.5;}
      else if(tmrwH){doc.weekdays.push(dObj.getDate());doc.totalHours+=(dow===1?10.5:12);}
      else if(dow===5){doc.weekdays.push(dObj.getDate());doc.totalHours+=8;}
      else if(dow===1){doc.weekdays.push(dObj.getDate());doc.totalHours+=3;}
      else{doc.weekdays.push(dObj.getDate());doc.totalHours+=4.5;}
    });
    (day.evening||'').split(' ').filter(Boolean).forEach(ini=>{
      const doc=data.find(x=>x.initial===ini||x.name===ini); if(!doc) return;
      if(isH) doc.totalHours+=12; else if(dow===6){doc.weekends.push(dObj.getDate());doc.totalHours+=6;}
    });
  });

  const dutyTbody=document.getElementById('duty-tbody'); dutyTbody.innerHTML='';
  data.filter(r=>r.totalHours>0).forEach(r=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`<td style="padding:12px 8px;font-weight:700;text-align:left">${r.name}<span class="title-badge">${r.title}</span></td><td style="padding:12px 8px;color:#64748b;font-size:12px">${r.weekdays.join(', ')}</td><td style="padding:12px 8px;color:#64748b;font-size:12px">${r.weekends.join(', ')}</td><td class="hours-cell" style="padding:12px 8px">${r.totalHours}h</td>`;
    dutyTbody.appendChild(tr);
  });

  const leaveTbody=document.getElementById('leave-tbody'); leaveTbody.innerHTML='';
  data.forEach(r=>{
    const usable=Math.min(r.totalLeave,20); const remain=usable-r.usedVacation; const payout=Math.max(0,r.totalLeave-20);
    const tr=document.createElement('tr');
    tr.innerHTML=`<td style="padding:12px 8px;font-weight:700;text-align:left">${r.name}<span class="title-badge">${r.title}</span></td><td class="used-cell" style="padding:12px 8px">${r.usedVacation}일</td><td class="remain-cell" style="padding:12px 8px">${remain}일${payout>0?`<span class="payout-note">수당 +${payout}일</span>`:''}</td>`;
    leaveTbody.appendChild(tr);
  });
}

function switchTab(tab) {
  document.getElementById('tab-content-duty').style.display=tab==='duty'?'block':'none';
  document.getElementById('tab-content-leave').style.display=tab==='leave'?'block':'none';
  document.getElementById('tab-duty').classList.toggle('active-tab',tab==='duty');
  document.getElementById('tab-leave').classList.toggle('active-tab',tab==='leave');
}
window.switchTab=switchTab;

window.toggleScreening=function(show){
  showScreening=show??!showScreening;
  document.getElementById('calendar-section').style.display=showScreening?'none':'block';
  document.getElementById('month-header').style.display=showScreening?'none':'flex';
  const wb=document.getElementById('weather-bar'); if(wb) wb.style.display=showScreening?'none':'block';
  const nb=document.getElementById('notice-bar'); if(nb) nb.style.display=showScreening?'none':'block';
  document.getElementById('screening').classList.toggle('visible',showScreening);
  document.getElementById('bottom-banner').style.display=showScreening?'none':'block';
  document.getElementById('btn-screening').classList.toggle('active',showScreening);
  if(showScreening) renderReport();
};

document.getElementById('btn-screening').onclick=()=>toggleScreening();
document.getElementById('btn-prev').onclick=()=>{ viewMonth--; if(viewMonth<0){viewMonth=11;viewYear--;} renderCalendar(); };
document.getElementById('btn-next').onclick=()=>{ viewMonth++; if(viewMonth>11){viewMonth=0;viewYear++;} renderCalendar(); };
