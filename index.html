<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="영상의학과 캘린더"/>
<meta name="theme-color" content="#1a237e"/>
<title>영상의학과 캘린더</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="https://via.placeholder.com/192/1a237e/ffffff?text=X">

<link rel=stylesheet href=style.css>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js')
        .then(reg => console.log('Service Worker Registered!', reg))
        .catch(err => console.log('Service Worker registration failed: ', err));
    });
  }
</script>

</head>
<body>

<!-- ─────────── MODERN LOGIN SCREEN ─────────── -->
<div id="login-overlay">
  <div class="login-card fade-in-up">
    <div class="login-icon">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
    </div>
    <h2>영상의학과 일정관리</h2>
    <p>보안을 위해 비밀번호를 입력해주세요</p>
    <input type="password" pattern="[0-9]*" inputmode="numeric" id="pin-input" class="pin-input" maxlength="4" placeholder="••••" autocomplete="off" onkeypress="if(event.key === 'Enter') handleLogin()">
    <button class="login-btn" onclick="handleLogin()">접속하기</button>
  </div>
</div>

<div id="app-container">
<!-- ── NAV ── -->

<nav>
  <div class="logo">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#93c5fd" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <h1>영상의학과 캘린더</h1>
  </div>
  <div class="nav-right">
    <span id="sync-indicator">●</span>
    <button id="btn-screening" title="정산">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="12" y2="14"/></svg>
    </button>
    <button id="btn-logout" title="로그아웃" onclick="handleLogout()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
    </button>
  </div>
</nav>

<!-- ── MONTH HEADER ── -->

<div id="month-header">
  <button id="btn-prev">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#475569" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <div id="month-title">
    <h2 id="month-text"></h2>
  </div>
  <button id="btn-next">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#475569" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
  </button>
</div>

<!-- ── CALENDAR ── -->

<div id="calendar-section">
  <div id="calendar-wrap">
    <div class="dow-header">
      <div>SUN</div><div>MON</div><div>TUE</div><div>WED</div><div>THU</div><div>FRI</div><div>SAT</div>
    </div>
    <div class="calendar-grid" id="cal-grid"></div>
  </div>
</div>

<!-- ── SCREENING ── -->

<div id="screening">
  <div class="screening-card fade-in-up">
    <div class="tab-bar">
      <button class="tab-btn duty-tab active-tab" id="tab-duty" onclick="switchTab('duty')">당직 정산표</button>
      <button class="tab-btn leave-tab" id="tab-leave" onclick="switchTab('leave')">연차 현황표</button>
    </div>
    <div id="tab-content-duty">
      <div style="overflow-x:auto;border-radius:1rem;border:1px solid #e2e8f0;">
        <table class="report-table">
          <thead><tr><th>성명</th><th>평일</th><th>주말/공휴일</th><th style="color:#4f46e5">총합</th></tr></thead>
          <tbody id="duty-tbody"></tbody>
        </table>
      </div>
    </div>
    <div id="tab-content-leave" style="display:none">
      <div style="overflow-x:auto;border-radius:1rem;border:1px solid #e2e8f0;">
        <table class="report-table">
          <thead><tr><th>성명</th><th style="color:#f43f5e">연차 차감</th><th style="color:#059669">잔여 연차</th></tr></thead>
          <tbody id="leave-tbody"></tbody>
        </table>
      </div>
    </div>
    <button class="back-btn" onclick="toggleScreening(false)">달력 화면으로 돌아가기</button>
  </div>
</div>

<!-- ── BOTTOM BANNER ── -->

<div id="bottom-banner">
  <div class="banner-inner">
    <div class="banner-scroll-wrap">
      <button class="banner-arr left" onclick="bannerScroll(-1)">&#8249;</button>
      <div class="banner-scroll" id="banner-scroll"></div>
      <button class="banner-arr right" onclick="bannerScroll(1)">&#8250;</button>
    </div>
  </div>
</div>

<!-- ── POPUP ── -->

<div id="popup-overlay" onclick="closePopup(event)">
  <div id="popup-sheet" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-title-wrap">
        <div class="label">Editor</div>
        <h3 id="popup-title"></h3>
      </div>
      <button class="close-btn" onclick="closePopup()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
      </button>
    </div>

<!-- 직원 선택 스크롤 -->
<div class="popup-doc-wrap">
  <button class="popup-arr left" onclick="popupScroll(-1)">&#8249;</button>
  <div class="popup-doc-scroll" id="popup-doc-scroll"></div>
  <button class="popup-arr right" onclick="popupScroll(1)">&#8250;</button>
</div>

<!-- 당직 배정 행들 -->
<div class="duty-rows" id="duty-rows"></div>

<!-- 메모(공지사항) 입력 섹션 -->
<div class="memo-section">
  <div class="memo-section-header">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--amber-500)"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    <span class="memo-section-label">메모 / 공지사항</span>
  </div>
  <textarea id="memo-textarea" class="memo-textarea" placeholder="이 날짜의 공지사항이나 특이사항을 입력하세요.&#10;'검사'라는 단어를 쓰면 달력에 장비알림 뱃지가 붙습니다 🛠️"></textarea>
  <button class="memo-save-btn" onclick="saveMemo()">메모 저장하기</button>
  <div class="memo-clear"></div>
</div>

<button class="done-btn" onclick="closePopup()">편집 완료 (닫기)</button>
  </div>
</div>

<!-- ── TOAST ── -->

<div id="toast"></div>

</div> <!-- END APP CONTAINER -->


<!-- ── LOGIN LOGIC ── -->


<!-- ── FIREBASE SDK ── -->


<!-- ── APP LOGIC ── -->



<script type="module" src="app.js"></script></body>
</html>
